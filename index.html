<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hwarang Capital</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 20px;
}

.banner {
  background: url('https://picsum.photos/800/300') no-repeat center/cover;
  padding: 60px 20px;
  text-align: center;
}

.banner h2 {
  background: rgba(0,0,0,0.6);
  display: inline-block;
  padding: 10px;
  border-radius: 8px;
}

.card {
  background: #1f2937;
  margin: 20px;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.balance {
  font-size: 26px;
  color: #00ffcc;
}

.locked {
  color: red;
}

.info {
  margin-top: 15px;
  font-size: 13px;
  color: #facc15;
}

.stats {
  margin-top: 15px;
  font-size: 14px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: gold;
  border-radius: 6px;
  cursor: pointer;
}

.section {
  padding: 20px;
}

.feature {
  background: #111827;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.feature:hover {
  background: #1f2937;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: gray;
}
</style>

<script>
let currentLang = "en";

function setLang(lang) {
  currentLang = lang;

  if (lang === "en") {
    document.getElementById("greet").innerText = "Hi Charial";
    document.getElementById("balance").innerText = "$100,000.00";
    document.getElementById("locked").innerText = "Funds locked to: Kim";
    document.getElementById("depositAmt").innerText = "Deposit: $0.00";
    document.getElementById("withdrawAmt").innerText = "Withdrawal: $0.00";
    document.getElementById("info").innerText = 
      "Note: Deposit $5,000 to unlock access to the $100,000 balance (demo only).";
    document.getElementById("demo").innerText = "Demo only - No real transactions";
  } else {
    document.getElementById("greet").innerText = "안녕하세요 Charial";
    document.getElementById("balance").innerText = "₩100,000";
    document.getElementById("locked").innerText = "자금 잠금 대상: Kim";
    document.getElementById("depositAmt").innerText = "입금: ₩0";
    document.getElementById("withdrawAmt").innerText = "출금: ₩0";
    document.getElementById("info").innerText = 
      "$100,000 잔액을 사용하려면 $5,000을 입금하세요 (데모 전용).";
    document.getElementById("demo").innerText = "데모 전용 - 실제 거래 없음";
  }
}

function deposit() {
  if (currentLang === "en") {
    alert("Awaiting payment");
  } else {
    alert("결제 대기 중");
  }
}

function withdraw() {
  if (currentLang === "en") {
    alert("Invest first");
  } else {
    alert("먼저 투자하세요");
  }
}

function clickFeature(name) {
  alert(name + " coming soon!");
}
</script>

</head>

<body>

<header>
  HWARANG CAPITAL (화랑 캐피탈)
</header>

<div class="banner">
  <h2>Invest Smart. Grow Strong.</h2>
</div>

<div class="card">
  <h2 id="greet">Hi Charial</h2>
  <div class="balance" id="balance">$100,000.00</div>
  <div class="locked" id="locked">Funds locked to: Kim</div>

  <div class="stats">
    <div id="depositAmt">Deposit: $0.00</div>
    <div id="withdrawAmt">Withdrawal: $0.00</div>
  </div>

  <div class="info" id="info">
    Note: Deposit $5,000 to unlock access to the $100,000 balance.
  </div>

  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<div style="text-align:center;">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('kr')">한국어</button>
</div>

<div class="section">
  <h3>Services</h3>

  <div class="feature" onclick="clickFeature('Investment Plans')">
    Investment Plans
  </div>

  <div class="feature" onclick="clickFeature('Loan Services')">
    Loan Services
  </div>

  <div class="feature" onclick="clickFeature('Crypto Trading')">
    Crypto Trading
  </div>
</div>

<div class="section">
  <h3>Sponsored</h3>
  <img src="https://picsum.photos/300/150" style="width:100%;border-radius:10px;">
</div>

<footer id="demo">
  Demo only - No real transactions
</footer>

</body>
</html>
