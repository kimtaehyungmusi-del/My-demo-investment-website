<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hwarang Capital</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
}

/* Header */
header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 20px;
}

/* Banner (ad style) */
.banner {
  background: url('https://picsum.photos/800/300') no-repeat center/cover;
  padding: 60px 20px;
  text-align: center;
}

.banner h2 {
  background: rgba(0,0,0,0.6);
  display: inline-block;
  padding: 10px;
  border-radius: 8px;
}

/* Main card */
.card {
  background: #1f2937;
  margin: 20px;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.balance {
  font-size: 26px;
  color: #00ffcc;
}

.locked {
  color: red;
}

/* Buttons */
button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: gold;
  border-radius: 6px;
  cursor: pointer;
}

/* Sections */
.section {
  padding: 20px;
}

.feature {
  background: #111827;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.feature:hover {
  background: #1f2937;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: gray;
}
</style>

<script>
function setLang(lang) {
  if (lang === "en") {
    document.getElementById("greet").innerText = "Hi Charial";
    document.getElementById("balance").innerText = "$100,000.00";
    document.getElementById("locked").innerText = "Funds locked to: Kim";
    document.getElementById("demo").innerText = "Demo only - No real transactions";
  } else {
    document.getElementById("greet").innerText = "안녕하세요 Charial";
    document.getElementById("balance").innerText = "₩100,000";
    document.getElementById("locked").innerText = "자금 잠금 대상: Kim";
    document.getElementById("demo").innerText = "데모 전용 - 실제 거래 없음";
  }
}

function clickFeature(name) {
  alert(name + " feature coming soon!");
}
</script>

</head>

<body>

<header>
  HWARANG CAPITAL (화랑 캐피탈)
</header>

<!-- Banner / Ads style -->
<div class="banner">
  <h2>Invest Smart. Grow Strong.</h2>
</div>

<!-- Account Card -->
<div class="card">
  <h2 id="greet">Hi Charial</h2>
  <div class="balance" id="balance">$100,000.00</div>
  <div class="locked" id="locked">Funds locked to: Kim</div>

  <button onclick="alert('Demo only')">Deposit</button>
  <button onclick="alert('Demo only')">Withdraw</button>
</div>

<!-- Language -->
<div style="text-align:center;">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('kr')">한국어</button>
</div>

<!-- Features Section -->
<div class="section">
  <h3>Services</h3>

  <div class="feature" onclick="clickFeature('Investment Plans')">
    Investment Plans
  </div>

  <div class="feature" onclick="clickFeature('Loan Services')">
    Loan Services
  </div>

  <div class="feature" onclick="clickFeature('Crypto Trading')">
    Crypto Trading
  </div>

  <div class="feature" onclick="clickFeature('Savings Account')">
    Savings Account
  </div>
</div>

<!-- Ads / Image Section -->
<div class="section">
  <h3>Sponsored</h3>
  <img src="https://picsum.photos/300/150" style="width:100%;border-radius:10px;">
</div>

<footer id="demo">
  Demo only - No real transactions
</footer>

</body>
</html>
